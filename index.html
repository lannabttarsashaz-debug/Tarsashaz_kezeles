<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teszt</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; }
        button { padding: 15px 25px; font-size: 16px; width: 100%; margin: 10px 0; cursor: pointer; }
        #loginBtn { background: #4285f4; color: white; border: none; border-radius: 8px; }
        #logoutBtn { background: #ea4335; color: white; border: none; border-radius: 8px; display: none; }
        textarea { width: 100%; height: 150px; font-size: 16px; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        #saveBtn { background: #34a853; color: white; border: none; border-radius: 8px; display: none; }
        #userInfo { margin: 10px 0; font-weight: bold; }
        #noteArea { display: none; }
    </style>
</head>
<body>
    <h2>🏠 Társasház Teszt</h2>
    <div id="userInfo">Nincs bejelentkezve</div>
    <button id="loginBtn" onclick="bejelentkezes()">Bejelentkezés Google-lal</button>
    <button id="logoutBtn" onclick="kijelentkezes()">Kijelentkezés</button>
    
    <div id="noteArea">
        <h3>Teszt jegyzet</h3>
        <textarea id="noteText" placeholder="Írj ide valamit..."></textarea>
        <button id="saveBtn" onclick="ment()">💾 Mentés</button>
        <div id="savedNote"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCgX2MRSTnVH8jfi6Z9Cht8W3W8P5wS8g8",
            authDomain: "tarsashaz-kezeles.firebaseapp.com",
            projectId: "tarsashaz-kezeles",
            storageBucket: "tarsashaz-kezeles.firebasestorage.app",
            messagingSenderId: "56435352901",
            appId: "1:56435352901:web:912fd31dc65ab20c184a2c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function bejelentkezes() {
            const provider = new firebase.auth.GoogleAuthProvider();
            const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
            if (isMobile) {
                auth.signInWithRedirect(provider);
            } else {
                auth.signInWithPopup(provider);
            }
        }

        function kijelentkezes() {
            auth.signOut();
        }

        function ment() {
            const text = document.getElementById('noteText').value;
            const user = auth.currentUser;
            db.collection('notes').doc(user.uid).set({ text: text })
                .then(() => { document.getElementById('savedNote').textContent = '✅ Mentve!'; })
                .catch(e => { alert('Mentési hiba: ' + e.message); });
        }

        auth.getRedirectResult().then(result => {
    if (result && result.user) {
        console.log('OK:', result.user.email);
    }
}).catch(e => { alert('Hiba: ' + e.code + ' - ' + e.message); });

        auth.onAuthStateChanged(user => {
    alert('Auth state: ' + (user ? user.email : 'null'));
    if (user) {
                document.getElementById('userInfo').textContent = '👤 ' + user.displayName;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'block';
                document.getElementById('noteArea').style.display = 'block';
                document.getElementById('saveBtn').style.display = 'block';
                db.collection('notes').doc(user.uid).get().then(doc => {
                    if (doc.exists) document.getElementById('noteText').value = doc.data().text;
                });
            } else {
                document.getElementById('userInfo').textContent = 'Nincs bejelentkezve';
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'none';
                document.getElementById('noteArea').style.display = 'none';
            }
        });
    </script>
</body>
</html>
