<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Property Management</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; padding: 16px; }

        /* LOGIN */
        #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-box { background: rgba(255,255,255,0.97); border-radius: 24px; padding: 50px 40px; text-align: center; max-width: 360px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-title { font-family: 'Playfair Display', serif; font-size: 2.2em; color: #c9a84c; letter-spacing: 2px; }
        .login-subtitle { font-size: 0.7em; letter-spacing: 3px; color: #888; text-transform: uppercase; margin: 8px 0 35px; }
        .google-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 14px 24px; background: white; border: 2px solid #e0e0e0; border-radius: 50px; font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 600; color: #333; cursor: pointer; transition: all 0.2s; }
        .google-btn:hover { border-color: #c9a84c; box-shadow: 0 4px 15px rgba(201,168,76,0.2); }
        .google-btn svg { width: 20px; height: 20px; flex-shrink: 0; pointer-events: none; }

        /* FŐOLDAL */
        #mainScreen { display: none; }
        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding: 0 4px; }
        .app-title { font-family: 'Playfair Display', serif; color: #c9a84c; font-size: 1.5em; letter-spacing: 1px; }
        .user-area { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #c9a84c; }
        .logout-btn { background: none; border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.7); padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; font-family: 'Montserrat', sans-serif; }

        /* CÉGCÍMKÉK */
        .company-section { margin-bottom: 28px; }
        .company-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #c9a84c; margin-bottom: 12px; padding-left: 4px; display: flex; align-items: center; gap: 8px; }
        .company-label::after { content: ''; flex: 1; height: 1px; background: rgba(201,168,76,0.3); }

        /* HÁZAK */
        .houses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
        .house-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.2s; position: relative; }
        .house-card:hover { background: rgba(255,255,255,0.1); border-color: rgba(201,168,76,0.4); transform: translateY(-2px); }
        .house-card-name { font-size: 1.05em; font-weight: 600; color: white; margin-bottom: 6px; padding-right: 30px; }
        .house-card-address { font-size: 0.8em; color: rgba(255,255,255,0.5); }
        .house-card-delete { position: absolute; top: 12px; right: 12px; background: none; border: none; color: rgba(255,255,255,0.2); font-size: 16px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: all 0.2s; }
        .house-card-delete:hover { background: rgba(220,53,69,0.2); color: #dc3545; }
        .empty-state { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.3); }
        .empty-state-icon { font-size: 2.5em; margin-bottom: 10px; }
        .empty-state-text { font-size: 0.85em; }

        /* ÚJ HÁZ GOMB */
        .add-btn { position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #c9a84c, #e8c86d); border: none; color: white; font-size: 26px; cursor: pointer; box-shadow: 0 4px 20px rgba(201,168,76,0.4); transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .add-btn:hover { transform: scale(1.1); }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: flex-end; justify-content: center; }
        .modal.open { display: flex; }
        .modal-box { background: white; border-radius: 24px 24px 0 0; padding: 28px 24px 40px; width: 100%; max-width: 520px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-title { font-family: 'Playfair Display', serif; font-size: 1.4em; color: #1a1a2e; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8em; font-weight: 600; color: #555; margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
        .form-group input, .form-group select { width: 100%; padding: 13px 16px; border: 2px solid #e8e8e8; border-radius: 12px; font-family: 'Montserrat', sans-serif; font-size: 15px; color: #333; background: #fafafa; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #c9a84c; background: white; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { flex: 1; padding: 14px; background: linear-gradient(135deg, #c9a84c, #e8c86d); border: none; border-radius: 12px; color: white; font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn-cancel { padding: 14px 20px; background: #f0f0f0; border: none; border-radius: 12px; color: #666; font-family: 'Montserrat', sans-serif; font-size: 15px; cursor: pointer; }

        /* MOBIL */
        @media (max-width: 480px) {
            body { padding: 12px; }
            .app-title { font-size: 1.25em; }
            .houses-grid { grid-template-columns: 1fr; }
            .login-box { padding: 35px 24px; }
            .login-title { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-box">
            <div class="login-title">ELITE</div>
            <div class="login-title" style="margin-top:-8px">PROPERTY</div>
            <div class="login-subtitle">Management Excellence</div>
            <button class="google-btn" onclick="bejelentkezes()">
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Bejelentkezés Google-lal
            </button>
        </div>
    </div>

    <div id="mainScreen">
        <div class="top-bar">
            <div class="app-title">🏠 Társasház</div>
            <div class="user-area">
                <img id="userAvatar" class="user-avatar" src="" alt="" style="display:none">
                <button class="logout-btn" onclick="kijelentkezes()">Kilépés</button>
            </div>
        </div>
        <div class="company-section">
            <div class="company-label">L'ANNA Bt.</div>
            <div class="houses-grid" id="lannaGrid">
                <div class="empty-state"><div class="empty-state-icon">🏢</div><div class="empty-state-text">Még nincs ház hozzáadva</div></div>
            </div>
        </div>
        <div class="company-section" id="otherSection" style="display:none">
            <div class="company-label" id="otherLabel">Egyéb</div>
            <div class="houses-grid" id="otherGrid"></div>
        </div>
    </div>

    <button class="add-btn" id="addBtn" style="display:none" onclick="ujHazModal()">+</button>

    <div class="modal" id="hazModal">
        <div class="modal-box">
            <div class="modal-title">Új ház hozzáadása</div>
            <div class="form-group">
                <label>Ház neve / azonosítója</label>
                <input type="text" id="hazNev" placeholder="pl. Kossuth u. 12.">
            </div>
            <div class="form-group">
                <label>Cím (opcionális)</label>
                <input type="text" id="hazCim" placeholder="pl. 7400 Kaposvár, Kossuth u. 12.">
            </div>
            <div class="form-group">
                <label>Kezelő cég</label>
                <select id="hazCeg">
                    <option value="lanna">L'ANNA Bt.</option>
                    <option value="other">Egyéb</option>
                </select>
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="bezarModal()">Mégsem</button>
                <button class="btn-save" onclick="hazMent()">Mentés</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCgX2MRSTnVH8jfi6Z9Cht8W3W8P5wS8g8",
            authDomain: "tarsashaz-kezeles.firebaseapp.com",
            projectId: "tarsashaz-kezeles",
            storageBucket: "tarsashaz-kezeles.firebasestorage.app",
            messagingSenderId: "56435352901",
            appId: "1:56435352901:web:912fd31dc65ab20c184a2c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let hazak = [];

        function bejelentkezes() {
            const provider = new firebase.auth.GoogleAuthProvider();
            const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
            if (isMobile) { auth.signInWithRedirect(provider); }
            else { auth.signInWithPopup(provider); }
        }
        function kijelentkezes() { auth.signOut(); }
        auth.getRedirectResult().catch(e => console.error(e));

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'block';
                document.getElementById('addBtn').style.display = 'flex';
                const av = document.getElementById('userAvatar');
                if (user.photoURL) { av.src = user.photoURL; av.style.display = 'block'; }
                hazakBetoltes(user.uid);
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainScreen').style.display = 'none';
                document.getElementById('addBtn').style.display = 'none';
            }
        });

        function hazakBetoltes(uid) {
            db.collection('users').doc(uid).collection('hazak')
                .orderBy('letrehozva', 'asc')
                .onSnapshot(snap => {
                    hazak = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    hazakRajzol();
                });
        }

        function hazakRajzol() {
            const lanna = hazak.filter(h => h.ceg === 'lanna');
            const other = hazak.filter(h => h.ceg === 'other');
            const lg = document.getElementById('lannaGrid');
            lg.innerHTML = lanna.length === 0
                ? '<div class="empty-state"><div class="empty-state-icon">🏢</div><div class="empty-state-text">Még nincs ház hozzáadva</div></div>'
                : lanna.map(hazKartya).join('');
            const os = document.getElementById('otherSection');
            if (other.length > 0) {
                os.style.display = 'block';
                document.getElementById('otherGrid').innerHTML = other.map(hazKartya).join('');
            } else { os.style.display = 'none'; }
        }

        function hazKartya(h) {
            return `<div class="house-card" onclick="hazMegnyit('${h.id}')">
                <div class="house-card-name">${h.nev}</div>
                ${h.cim ? `<div class="house-card-address">${h.cim}</div>` : ''}
                <button class="house-card-delete" onclick="event.stopPropagation();hazTorol('${h.id}')">✕</button>
            </div>`;
        }

        function hazMegnyit(id) {
            const haz = hazak.find(h => h.id === id);
            alert('Hamarosan: eseménynapló — ' + haz?.nev);
        }

        function hazTorol(id) {
            if (!confirm('Biztosan törlöd ezt a házat?')) return;
            db.collection('users').doc(auth.currentUser.uid).collection('hazak').doc(id).delete();
        }

        function ujHazModal() {
            document.getElementById('hazNev').value = '';
            document.getElementById('hazCim').value = '';
            document.getElementById('hazCeg').value = 'lanna';
            document.getElementById('hazModal').classList.add('open');
        }
        function bezarModal() { document.getElementById('hazModal').classList.remove('open'); }
        function hazMent() {
            const nev = document.getElementById('hazNev').value.trim();
            if (!nev) { alert('A ház neve kötelező!'); return; }
            db.collection('users').doc(auth.currentUser.uid).collection('hazak').add({
                nev, cim: document.getElementById('hazCim').value.trim(),
                ceg: document.getElementById('hazCeg').value,
                letrehozva: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => bezarModal());
        }
        document.getElementById('hazModal').addEventListener('click', function(e) {
            if (e.target === this) bezarModal();
        });
    </script>
</body>
</html>
