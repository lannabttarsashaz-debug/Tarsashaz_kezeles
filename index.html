<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Property Management</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; }

        /* LOGIN */
        #loginScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        #loginScreen.hidden { display: none; }
        .login-box {
            background: white;
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 30px 90px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        .login-title {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #d4af37 0%, #f4e5c3 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5em;
            margin-bottom: 15px;
            font-weight: 900;
        }
        .login-subtitle {
            color: #666;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9em;
        }
        .google-signin-btn {
            background: white;
            border: 2px solid #d4af37;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
            font-family: 'Montserrat', sans-serif;
        }
        .google-signin-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(212,175,55,0.4);
        }
        .google-icon { width: 24px; height: 24px; pointer-events: none; }

        /* FŐOLDAL */
        #mainScreen { display: none; }
        button { padding: 15px 25px; font-size: 16px; width: 100%; margin: 10px 0; cursor: pointer; }
        #logoutBtn { background: #ea4335; color: white; border: none; border-radius: 8px; }
        textarea { width: 100%; height: 150px; font-size: 16px; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        #saveBtn { background: #34a853; color: white; border: none; border-radius: 8px; }
        #userInfo { margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginScreen">
        <div class="login-box">
            <h1 class="login-title">ELITE PROPERTY</h1>
            <p class="login-subtitle">Management Excellence</p>
            <button class="google-signin-btn" onclick="bejelentkezes()">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Bejelentkezés Google-lal
            </button>
        </div>
    </div>

    <!-- FŐOLDAL -->
    <div id="mainScreen">
        <div id="userInfo">Nincs bejelentkezve</div>
        <button id="logoutBtn" onclick="kijelentkezes()">Kijelentkezés</button>
        <h3>Teszt - bejelentkezés működik! ✅</h3>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCgX2MRSTnVH8jfi6Z9Cht8W3W8P5wS8g8",
            authDomain: "tarsashaz-kezeles.firebaseapp.com",
            projectId: "tarsashaz-kezeles",
            storageBucket: "tarsashaz-kezeles.firebasestorage.app",
            messagingSenderId: "56435352901",
            appId: "1:56435352901:web:912fd31dc65ab20c184a2c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function bejelentkezes() {
            const provider = new firebase.auth.GoogleAuthProvider();
            const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
            if (isMobile) { auth.signInWithRedirect(provider); }
            else { auth.signInWithPopup(provider); }
        }

        function kijelentkezes() { auth.signOut(); }

        auth.getRedirectResult().catch(e => console.error(e));

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainScreen').style.display = 'block';
                document.getElementById('userInfo').textContent = '👤 ' + user.displayName;
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainScreen').style.display = 'none';
            }
        });
    </script>
</body>
</html>
