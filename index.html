<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Property Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #0f3460); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 50px; border-radius: 30px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 30px 90px rgba(0,0,0,0.5); }
        .login-title { font-size: 2em; color: #d4af37; font-weight: 900; margin-bottom: 5px; }
        .login-subtitle { color: #888; letter-spacing: 2px; font-size: 0.8em; text-transform: uppercase; margin-bottom: 30px; }
        .google-btn { display: inline-flex; align-items: center; gap: 12px; padding: 15px 30px; background: white; border: 2px solid #d4af37; border-radius: 50px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(212,175,55,0.3); transition: all 0.3s; width: 100%; justify-content: center; }
        .google-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212,175,55,0.4); }
        #mainScreen { display: none; color: white; text-align: center; padding: 20px; }
        #mainScreen h2 { color: #d4af37; margin-bottom: 10px; }
        .logout-btn { margin-top: 20px; padding: 10px 25px; background: #ea4335; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-box">
            <div class="login-title">ELITE PROPERTY</div>
            <div class="login-subtitle">Management Excellence</div>
            <button class="google-btn" onclick="bejelentkezes()">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Bejelentkezés Google-lal
            </button>
        </div>
    </div>

    <div id="mainScreen">
        <h2>✅ Bejelentkezés sikeres!</h2>
        <p id="userName"></p>
        <button class="logout-btn" onclick="kijelentkezes()">Kijelentkezés</button>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://afxtwbyeqxgjddlonptj.supabase.co',
            'sb_publishable_MMAhfCJ7JKo6CIduJtKcOg_Nksp8I81'
        );

        async function bejelentkezes() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.href
                }
            });
            if (error) alert('Hiba: ' + error.message);
        }

        async function kijelentkezes() {
            await supabase.auth.signOut();
            location.reload();
        }

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'block';
                document.getElementById('userName').textContent = '👤 ' + session.user.email;
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainScreen').style.display = 'none';
            }
        });
    </script>
</body>
</html>
