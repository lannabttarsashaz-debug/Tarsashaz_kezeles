<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Property Management</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(212,175,55,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(184,134,11,0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* LOGIN */
        .login-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        .login-screen.hidden { display: none; }
        .login-box {
            background: rgba(255,255,255,0.97);
            border-radius: 30px;
            padding: 50px 45px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 30px 90px rgba(0,0,0,0.5), 0 0 1px 1px rgba(212,175,55,0.3);
            position: relative;
        }
        .login-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #d4af37, #f4e5c3, #d4af37);
            border-radius: 30px 30px 0 0;
        }
        .login-title {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #d4af37 0%, #f4e5c3 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 3em;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .login-subtitle {
            color: #666;
            font-size: 0.85em;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 35px;
            font-weight: 300;
        }
        .login-email-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e8e8e8;
            border-radius: 50px;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        .login-email-input:focus { border-color: #d4af37; }
        .magic-btn {
            background: linear-gradient(135deg, #d4af37 0%, #f4e5c3 50%, #d4af37 100%);
            color: #1a1a2e;
            border: none;
            padding: 16px 35px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 20px rgba(212,175,55,0.4);
            transition: all 0.3s;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .magic-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(212,175,55,0.5); }
        .login-msg { margin-top: 15px; padding: 12px; border-radius: 12px; font-size: 14px; }
        .login-msg.success { background: #e8f5e9; color: #2e7d32; }
        .login-msg.error { background: #ffebee; color: #c62828; }

        /* FŐOLDAL */
        #mainScreen { display: none; position: relative; z-index: 1; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 30px 90px rgba(0,0,0,0.5), 0 0 1px 1px rgba(212,175,55,0.3);
            position: relative;
            backdrop-filter: blur(20px);
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #d4af37, #f4e5c3, #d4af37);
            border-radius: 30px 30px 0 0;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #d4af37 0%, #f4e5c3 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-align: center;
            font-size: 3.5em;
            font-weight: 900;
            letter-spacing: 2px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.95em;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* TOP BAR */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .user-email {
            font-size: 0.85em;
            color: #666;
            font-weight: 500;
        }
        .logout-btn {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 25px;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
        }
        .logout-btn:hover { transform: translateY(-2px); }

        /* CÉGCÍMKÉK */
        .company-section { margin-bottom: 40px; }
        .company-label {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(212,175,55,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .company-label::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, rgba(212,175,55,0.3), transparent);
        }

        /* HÁZAK */
        .houses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .house-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            border: 2px solid #d4af37;
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        .house-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #d4af37, #f4e5c3, #c0c0c0, #d4af37);
        }
        .house-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(212,175,55,0.25);
        }
        .house-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4em;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
            padding-right: 30px;
        }
        .house-address {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        .house-actions {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #ecf0f1;
            display: flex;
            gap: 10px;
        }
        .house-delete {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 25px;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
        }
        .house-delete:hover { transform: translateY(-2px); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #aaa;
            font-size: 0.9em;
        }

        /* ÚJ HÁZ GOMB */
        .add-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37, #f4e5c3, #d4af37);
            border: none;
            color: #1a1a2e;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(212,175,55,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 100;
        }
        .add-btn:hover { transform: scale(1.1) rotate(90deg); }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 25px;
            padding: 40px 35px;
            width: 90%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 30px 90px rgba(0,0,0,0.3);
        }
        .modal-content::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #d4af37, #f4e5c3, #d4af37);
            border-radius: 25px 25px 0 0;
        }
        .modal-content h2 {
            font-family: 'Playfair Display', serif;
            color: #1a1a2e;
            margin-bottom: 25px;
            font-size: 1.8em;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 0.8em;
            font-weight: 700;
            color: #555;
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 13px 18px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Montserrat', sans-serif;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus { border-color: #d4af37; }
        .form-buttons { display: flex; gap: 12px; margin-top: 25px; }
        .btn-save {
            flex: 1;
            background: linear-gradient(135deg, #d4af37, #f4e5c3, #d4af37);
            color: #1a1a2e;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 1px;
        }
        .btn-cancel {
            padding: 14px 22px;
            background: #f0f0f0;
            border: none;
            border-radius: 12px;
            color: #666;
            font-size: 15px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }

        /* MOBIL */
        @media (max-width: 480px) {
            body { padding: 12px; }
            .container { padding: 20px 15px 80px; border-radius: 20px; }
            h1 { font-size: 2.2em; }
            .houses-grid { grid-template-columns: 1fr; gap: 15px; }
            .house-card { padding: 22px 18px; }
            .house-name { font-size: 1.2em; }
            .modal-content { padding: 30px 20px; }
            .add-btn { bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1 class="login-title">ELITE PROPERTY</h1>
            <p class="login-subtitle">Management Excellence</p>
            <input type="email" class="login-email-input" id="emailInput" placeholder="Email cím" />
            <button class="magic-btn" onclick="bejelentkezes()">✉️ Bejelentkezés emailben</button>
            <div id="loginMsg"></div>
        </div>
    </div>

    <!-- FŐOLDAL -->
    <div id="mainScreen">
        <div class="container">
            <h1>ELITE PROPERTY</h1>
            <p class="subtitle">Management Excellence</p>

            <div class="top-bar">
                <span class="user-email" id="userEmail"></span>
                <button class="logout-btn" onclick="kijelentkezes()">Kilépés</button>
            </div>

            <!-- L'ANNA Bt. -->
            <div class="company-section">
                <div class="company-label">🏢 L'ANNA Bt.</div>
                <div class="houses-grid" id="lannaGrid">
                    <div class="empty-state">Még nincs ház hozzáadva</div>
                </div>
            </div>

            <!-- Egyéb -->
            <div class="company-section" id="otherSection" style="display:none">
                <div class="company-label">🏠 Egyéb</div>
                <div class="houses-grid" id="otherGrid"></div>
            </div>
        </div>
    </div>

    <!-- ÚJ HÁZ GOMB -->
    <button class="add-btn" id="addBtn" onclick="ujHazModal()">+</button>

    <!-- ÚJ HÁZ MODAL -->
    <div class="modal" id="hazModal">
        <div class="modal-content">
            <h2>Új ház hozzáadása</h2>
            <div class="form-group">
                <label>Ház neve</label>
                <input type="text" id="hazNev" placeholder="pl. Kossuth u. 12." />
            </div>
            <div class="form-group">
                <label>Cím (opcionális)</label>
                <input type="text" id="hazCim" placeholder="pl. 7400 Kaposvár, Kossuth u. 12." />
            </div>
            <div class="form-group">
                <label>Kezelő cég</label>
                <select id="hazCeg">
                    <option value="lanna">L'ANNA Bt.</option>
                    <option value="other">Egyéb</option>
                </select>
            </div>
            <div class="form-buttons">
                <button class="btn-cancel" onclick="bezarModal()">Mégsem</button>
                <button class="btn-save" onclick="hazMent()">Mentés</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const sb = window.supabase.createClient(
            'https://afxtwbyeqxgjddlonptj.supabase.co',
            'sb_publishable_MMAhfCJ7JKo6CIduJtKcOg_Nksp8I81'
        );

        let hazak = [];

        async function bejelentkezes() {
            const email = document.getElementById('emailInput').value.trim();
            if (!email) { showLoginMsg('Add meg az email címed!', 'error'); return; }
            const { error } = await sb.auth.signInWithOtp({
                email, options: { emailRedirectTo: window.location.href }
            });
            if (error) { showLoginMsg('Hiba: ' + error.message, 'error'); }
            else { showLoginMsg('✅ Link elküldve! Nézd meg az emailjeid.', 'success'); }
        }

        function showLoginMsg(text, type) {
            const msg = document.getElementById('loginMsg');
            msg.textContent = text;
            msg.className = 'login-msg ' + type;
        }

        function kijelentkezes() { sb.auth.signOut().then(() => location.reload()); }

        sb.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainScreen').style.display = 'block';
                document.getElementById('addBtn').style.display = 'flex';
                document.getElementById('userEmail').textContent = session.user.email;
                hazakBetoltes(session.user.id);
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainScreen').style.display = 'none';
                document.getElementById('addBtn').style.display = 'none';
            }
        });

        async function hazakBetoltes(userId) {
            const { data, error } = await sb.from('hazak').select('*').eq('user_id', userId).order('letrehozva', { ascending: true });
            if (error) { console.error(error); return; }
            hazak = data || [];
            hazakRajzol();
        }

        function hazakRajzol() {
            const lanna = hazak.filter(h => h.ceg === 'lanna');
            const other = hazak.filter(h => h.ceg === 'other');
            const lg = document.getElementById('lannaGrid');
            lg.innerHTML = lanna.length === 0
                ? '<div class="empty-state">Még nincs ház hozzáadva</div>'
                : lanna.map(hazKartya).join('');
            const os = document.getElementById('otherSection');
            if (other.length > 0) {
                os.style.display = 'block';
                document.getElementById('otherGrid').innerHTML = other.map(hazKartya).join('');
            } else { os.style.display = 'none'; }
        }

        function hazKartya(h) {
            return `<div class="house-card">
                <div class="house-name">${h.nev}</div>
                ${h.cim ? `<div class="house-address">📍 ${h.cim}</div>` : ''}
                <div class="house-actions">
                    <button class="house-delete" onclick="hazTorol('${h.id}')">Törlés</button>
                </div>
            </div>`;
        }

        async function hazTorol(id) {
            if (!confirm('Biztosan törlöd ezt a házat?')) return;
            const { data: { user } } = await sb.auth.getUser();
            await sb.from('hazak').delete().eq('id', id).eq('user_id', user.id);
            hazakBetoltes(user.id);
        }

        function ujHazModal() {
            document.getElementById('hazNev').value = '';
            document.getElementById('hazCim').value = '';
            document.getElementById('hazCeg').value = 'lanna';
            document.getElementById('hazModal').classList.add('active');
        }

        function bezarModal() { document.getElementById('hazModal').classList.remove('active'); }

        async function hazMent() {
            const nev = document.getElementById('hazNev').value.trim();
            if (!nev) { alert('A ház neve kötelező!'); return; }
            const { data: { user } } = await sb.auth.getUser();
            const { error } = await sb.from('hazak').insert({
                nev,
                cim: document.getElementById('hazCim').value.trim(),
                ceg: document.getElementById('hazCeg').value,
                user_id: user.id,
                letrehozva: new Date().toISOString()
            });
            if (error) { alert('Hiba: ' + error.message); return; }
            bezarModal();
            hazakBetoltes(user.id);
        }

        document.getElementById('hazModal').addEventListener('click', function(e) {
            if (e.target === this) bezarModal();
        });
    </script>
</body>
</html>
