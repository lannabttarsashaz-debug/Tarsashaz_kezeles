<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Property Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #0f3460); min-height: 100vh; padding: 16px; }

        /* LOGIN */
        #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: white; padding: 45px 35px; border-radius: 30px; text-align: center; max-width: 380px; width: 100%; box-shadow: 0 30px 90px rgba(0,0,0,0.5); }
        .login-title { font-size: 2em; color: #d4af37; font-weight: 900; margin-bottom: 5px; letter-spacing: 2px; }
        .login-subtitle { color: #888; letter-spacing: 3px; font-size: 0.75em; text-transform: uppercase; margin-bottom: 30px; }
        input[type="email"] { width: 100%; padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; margin-bottom: 12px; outline: none; }
        .send-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #d4af37, #f0d060); border: none; border-radius: 12px; font-size: 16px; font-weight: 700; color: white; cursor: pointer; }
        .msg { margin-top: 15px; padding: 12px; border-radius: 10px; font-size: 14px; }
        .msg.success { background: #e8f5e9; color: #2e7d32; }
        .msg.error { background: #ffebee; color: #c62828; }

        /* FŐOLDAL */
        #mainScreen { display: none; }
        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding: 8px 4px; }
        .app-title { color: #d4af37; font-size: 1.4em; font-weight: 900; letter-spacing: 1px; }
        .logout-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.8); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; }

        /* CÉGSZEKCIÓK */
        .company-section { margin-bottom: 28px; }
        .company-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #d4af37; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .company-label::after { content: ''; flex: 1; height: 1px; background: rgba(212,175,55,0.3); }

        /* HÁZAK */
        .houses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .house-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.2s; position: relative; }
        .house-card:hover { background: rgba(255,255,255,0.12); border-color: rgba(212,175,55,0.4); }
        .house-name { font-size: 1.05em; font-weight: 600; color: white; margin-bottom: 5px; padding-right: 30px; }
        .house-address { font-size: 0.8em; color: rgba(255,255,255,0.5); }
        .house-delete { position: absolute; top: 12px; right: 12px; background: none; border: none; color: rgba(255,255,255,0.2); font-size: 16px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: all 0.2s; }
        .house-delete:hover { background: rgba(220,53,69,0.2); color: #dc3545; }
        .empty-state { text-align: center; padding: 30px; color: rgba(255,255,255,0.3); font-size: 0.9em; }

        /* ÚJ HÁZ GOMB */
        .add-btn { position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #d4af37, #f0d060); border: none; color: white; font-size: 28px; cursor: pointer; box-shadow: 0 4px 20px rgba(212,175,55,0.4); display: none; align-items: center; justify-content: center; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: flex-end; justify-content: center; }
        .modal.open { display: flex; }
        .modal-box { background: white; border-radius: 24px 24px 0 0; padding: 28px 24px 40px; width: 100%; max-width: 520px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-title { font-size: 1.4em; font-weight: 700; color: #1a1a2e; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8em; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select { width: 100%; padding: 13px 16px; border: 2px solid #e8e8e8; border-radius: 12px; font-size: 15px; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: #d4af37; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { flex: 1; padding: 14px; background: linear-gradient(135deg, #d4af37, #f0d060); border: none; border-radius: 12px; color: white; font-size: 15px; font-weight: 700; cursor: pointer; }
        .btn-cancel { padding: 14px 20px; background: #f0f0f0; border: none; border-radius: 12px; color: #666; font-size: 15px; cursor: pointer; }

        @media (max-width: 480px) {
            .houses-grid { grid-template-columns: 1fr; }
            .app-title { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div class="login-box">
            <div class="login-title">ELITE PROPERTY</div>
            <div class="login-subtitle">Management Excellence</div>
            <input type="email" id="emailInput" placeholder="Email cím" />
            <button class="send-btn" onclick="bejelentkezes()">✉️ Magic Link küldése</button>
            <div id="msg"></div>
        </div>
    </div>

    <div id="mainScreen">
        <div class="top-bar">
            <div class="app-title">🏠 Társasház</div>
            <button class="logout-btn" onclick="kijelentkezes()">Kilépés</button>
        </div>

        <div class="company-section">
            <div class="company-label">L'ANNA Bt.</div>
            <div class="houses-grid" id="lannaGrid">
                <div class="empty-state">Még nincs ház hozzáadva</div>
            </div>
        </div>

        <div class="company-section" id="otherSection" style="display:none">
            <div class="company-label">Egyéb</div>
            <div class="houses-grid" id="otherGrid"></div>
        </div>
    </div>

    <button class="add-btn" id="addBtn" onclick="ujHazModal()">+</button>

    <div class="modal" id="hazModal">
        <div class="modal-box">
            <div class="modal-title">Új ház hozzáadása</div>
            <div class="form-group">
                <label>Ház neve</label>
                <input type="text" id="hazNev" placeholder="pl. Kossuth u. 12." />
            </div>
            <div class="form-group">
                <label>Cím (opcionális)</label>
                <input type="text" id="hazCim" placeholder="pl. 7400 Kaposvár, Kossuth u. 12." />
            </div>
            <div class="form-group">
                <label>Kezelő cég</label>
                <select id="hazCeg">
                    <option value="lanna">L'ANNA Bt.</option>
                    <option value="other">Egyéb</option>
                </select>
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="bezarModal()">Mégsem</button>
                <button class="btn-save" onclick="hazMent()">Mentés</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const sb = window.supabase.createClient(
            'https://afxtwbyeqxgjddlonptj.supabase.co',
            'sb_publishable_MMAhfCJ7JKo6CIduJtKcOg_Nksp8I81'
        );

        let hazak = [];

        // BEJELENTKEZÉS
        async function bejelentkezes() {
            const email = document.getElementById('emailInput').value.trim();
            if (!email) { showMsg('Add meg az email címed!', 'error'); return; }
            const { error } = await sb.auth.signInWithOtp({
                email, options: { emailRedirectTo: window.location.href }
            });
            if (error) { showMsg('Hiba: ' + error.message, 'error'); }
            else { showMsg('✅ Link elküldve! Nézd meg az emailjeid.', 'success'); }
        }

        function showMsg(text, type) {
            const msg = document.getElementById('msg');
            msg.textContent = text;
            msg.className = 'msg ' + type;
        }

        function kijelentkezes() {
            sb.auth.signOut().then(() => location.reload());
        }

        // AUTH STATE
        sb.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'block';
                document.getElementById('addBtn').style.display = 'flex';
                hazakBetoltes(session.user.id);
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainScreen').style.display = 'none';
                document.getElementById('addBtn').style.display = 'none';
            }
        });

        // HÁZAK
        async function hazakBetoltes(userId) {
            const { data, error } = await sb.from('hazak').select('*').eq('user_id', userId).order('letrehozva', { ascending: true });
            if (error) { console.error(error); return; }
            hazak = data || [];
            hazakRajzol();
        }

        function hazakRajzol() {
            const lanna = hazak.filter(h => h.ceg === 'lanna');
            const other = hazak.filter(h => h.ceg === 'other');
            const lg = document.getElementById('lannaGrid');
            lg.innerHTML = lanna.length === 0
                ? '<div class="empty-state">Még nincs ház hozzáadva</div>'
                : lanna.map(hazKartya).join('');
            const os = document.getElementById('otherSection');
            if (other.length > 0) {
                os.style.display = 'block';
                document.getElementById('otherGrid').innerHTML = other.map(hazKartya).join('');
            } else { os.style.display = 'none'; }
        }

        function hazKartya(h) {
            return `<div class="house-card">
                <div class="house-name">${h.nev}</div>
                ${h.cim ? `<div class="house-address">${h.cim}</div>` : ''}
                <button class="house-delete" onclick="hazTorol('${h.id}')">✕</button>
            </div>`;
        }

        async function hazTorol(id) {
            if (!confirm('Biztosan törlöd ezt a házat?')) return;
            const { data: { user } } = await sb.auth.getUser();
            await sb.from('hazak').delete().eq('id', id).eq('user_id', user.id);
            hazakBetoltes(user.id);
        }

        function ujHazModal() {
            document.getElementById('hazNev').value = '';
            document.getElementById('hazCim').value = '';
            document.getElementById('hazCeg').value = 'lanna';
            document.getElementById('hazModal').classList.add('open');
        }

        function bezarModal() {
            document.getElementById('hazModal').classList.remove('open');
        }

        async function hazMent() {
            const nev = document.getElementById('hazNev').value.trim();
            if (!nev) { alert('A ház neve kötelező!'); return; }
            const { data: { user } } = await sb.auth.getUser();
            const { error } = await sb.from('hazak').insert({
                nev,
                cim: document.getElementById('hazCim').value.trim(),
                ceg: document.getElementById('hazCeg').value,
                user_id: user.id,
                letrehozva: new Date().toISOString()
            });
            if (error) { alert('Hiba: ' + error.message); return; }
            bezarModal();
            hazakBetoltes(user.id);
        }

        document.getElementById('hazModal').addEventListener('click', function(e) {
            if (e.target === this) bezarModal();
        });
    </script>
</body>
</html>
