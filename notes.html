<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Property – Jegyzetfüzet</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(212,175,55,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(184,134,11,0.1) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .container {
            max-width: 1200px; margin: 0 auto;
            background: rgba(255,255,255,0.98); border-radius: 30px; padding: 50px;
            box-shadow: 0 30px 90px rgba(0,0,0,0.5), 0 0 1px 1px rgba(212,175,55,0.3);
            position: relative; z-index: 1;
        }

        .container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, #d4af37, #f4e5c3, #d4af37);
            border-radius: 30px 30px 0 0;
        }

        .back-btn {
            background: none; border: none; color: #d4af37; font-size: 14px;
            font-weight: 700; font-family: 'Montserrat', sans-serif;
            cursor: pointer; padding: 8px 0; letter-spacing: 0.5px;
            transition: opacity 0.2s; margin-bottom: 10px; display: block;
        }
        .back-btn:hover { opacity: 0.7; }

        h1 {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #d4af37, #f4e5c3, #d4af37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; font-size: 2.8em; font-weight: 900;
        }

        .subtitle {
            text-align: center; color: #95a5a6; font-size: 13px;
            letter-spacing: 3px; text-transform: uppercase; margin-bottom: 35px;
        }

        .top-bar { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; align-items: center; }

        .search-input {
            flex: 1; min-width: 200px; padding: 12px 20px;
            border: 2px solid #ecf0f1; border-radius: 50px;
            font-family: 'Montserrat', sans-serif; font-size: 14px;
            color: #2c3e50; outline: none; transition: border-color 0.3s;
        }
        .search-input:focus { border-color: #d4af37; }

        .tag-filter {
            padding: 12px 20px; border: 2px solid #ecf0f1; border-radius: 50px;
            font-family: 'Montserrat', sans-serif; font-size: 14px;
            color: #2c3e50; outline: none; cursor: pointer; background: white;
            transition: border-color 0.3s;
        }
        .tag-filter:focus { border-color: #d4af37; }

        .btn-primary {
            background: linear-gradient(135deg, #d4af37, #f4e5c3, #d4af37);
            background-size: 200%; color: #1a1a2e; border: none;
            padding: 12px 28px; border-radius: 50px;
            font-family: 'Montserrat', sans-serif; font-weight: 700;
            font-size: 14px; cursor: pointer; transition: all 0.3s;
            white-space: nowrap; box-shadow: 0 4px 15px rgba(212,175,55,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212,175,55,0.4); }
        .btn-cancel { background: linear-gradient(135deg, #95a5a6, #7f8c8d); color: white; }

        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        .note-card {
            background: white; border: 2px solid #ecf0f1; border-radius: 20px;
            padding: 25px; transition: all 0.3s; position: relative; cursor: pointer;
        }
        .note-card:hover { border-color: #d4af37; box-shadow: 0 8px 30px rgba(212,175,55,0.2); transform: translateY(-3px); }

        .note-tag {
            display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 11px;
            font-weight: 700; margin-bottom: 12px;
            background: linear-gradient(135deg, #d4af37, #f4e5c3); color: #1a1a2e;
        }

        .note-title { font-family: 'Playfair Display', serif; font-size: 1.15em; font-weight: 700; color: #2c3e50; margin-bottom: 10px; line-height: 1.3; }

        .note-preview {
            font-size: 13px; color: #7f8c8d; line-height: 1.6;
            display: -webkit-box; -webkit-line-clamp: 4;
            -webkit-box-orient: vertical; overflow: hidden; white-space: pre-line;
        }

        .note-footer { margin-top: 15px; padding-top: 12px; border-top: 1px solid #ecf0f1; display: flex; justify-content: space-between; align-items: center; }
        .note-date { font-size: 11px; color: #bdc3c7; }
        .note-actions { display: flex; gap: 6px; }

        .btn-icon {
            background: none; border: 1px solid #ecf0f1; border-radius: 8px;
            padding: 5px 10px; font-size: 13px; cursor: pointer;
            font-family: 'Montserrat', sans-serif; color: #7f8c8d; transition: all 0.2s;
        }
        .btn-icon:hover { border-color: #d4af37; color: #d4af37; }
        .btn-delete { color: #e74c3c; }
        .btn-delete:hover { border-color: #e74c3c !important; color: #e74c3c !important; }

        #noteDetail { display: none; }

        .note-detail-header { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .note-detail-title { font-family: 'Playfair Display', serif; font-size: 2em; color: #2c3e50; font-weight: 700; flex: 1; }
        .note-detail-body {
            background: #fafbfc; border-radius: 16px; padding: 30px;
            font-size: 15px; color: #34495e; line-height: 1.8; white-space: pre-line;
            min-height: 300px; border: 2px solid #ecf0f1;
        }

        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 1000;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal.open { display: flex; }

        .modal-content {
            background: white; border-radius: 25px; padding: 40px;
            width: 100%; max-width: 600px; max-height: 90vh;
            overflow-y: auto; position: relative;
        }
        .modal-content::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #d4af37, #f4e5c3, #d4af37);
            border-radius: 25px 25px 0 0;
        }
        .modal-content h2 { font-family: 'Playfair Display', serif; font-size: 1.8em; color: #2c3e50; margin-bottom: 25px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #7f8c8d; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 18px; border: 2px solid #ecf0f1; border-radius: 12px;
            font-family: 'Montserrat', sans-serif; font-size: 14px; color: #2c3e50; outline: none; transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #d4af37; }
        .form-group textarea { resize: vertical; min-height: 200px; }

        .form-buttons { display: flex; gap: 12px; margin-top: 25px; }

        .empty-state { text-align: center; padding: 80px 20px; color: #95a5a6; }
        .empty-state-icon { font-size: 4em; margin-bottom: 20px; }
        .hidden { display: none !important; }

        /* LOGIN SCREEN */
        .login-box {
            text-align: center; padding: 60px 20px;
        }
        .login-box p { color: #666; margin-bottom: 20px; font-size: 15px; }
        .login-input {
            width: 100%; max-width: 360px; padding: 14px 20px; margin-bottom: 14px;
            border: 2px solid #ecf0f1; border-radius: 50px;
            font-family: 'Montserrat', sans-serif; font-size: 15px; outline: none;
            transition: border-color 0.3s; display: block; margin: 0 auto 14px;
        }
        .login-input:focus { border-color: #d4af37; }
        .login-msg { font-size: 14px; margin-top: 12px; min-height: 20px; }

        /* HAMBURGER */
        .hamburger-btn {
            position: fixed; top: 25px; right: 25px; z-index: 3000;
            background: linear-gradient(135deg, #d4af37 0%, #f4e5c3 100%);
            border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #1a1a2e; transition: all 0.3s;
        }
        .hamburger-btn:hover { transform: scale(1.05); }

        .sidebar-menu {
            position: fixed; top: 0; right: -350px; width: 350px; height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            box-shadow: -5px 0 30px rgba(0,0,0,0.3); z-index: 2500;
            transition: right 0.4s cubic-bezier(0.4,0,0.2,1); overflow-y: auto;
            padding: 100px 30px 30px 30px;
        }
        .sidebar-menu.open { right: 0; }

        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .sidebar-overlay.active { opacity: 1; pointer-events: all; }

        .menu-section { margin-bottom: 35px; }
        .menu-section-title {
            font-family: 'Playfair Display', serif; font-size: 1.1em; font-weight: 700;
            color: #2c3e50; margin-bottom: 15px; padding-bottom: 10px;
            border-bottom: 2px solid #d4af37; letter-spacing: 1px;
        }

        .module-menu-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

        .module-menu-card {
            background: linear-gradient(160deg, #fffbe6 0%, #f5e6b0 50%, #e8c94a 100%);
            border: 2px solid #1a1a1a; border-radius: 14px; padding: 14px 6px 12px;
            text-align: center; text-decoration: none; cursor: pointer;
            transition: all 0.25s; box-shadow: 0 3px 10px rgba(0,0,0,0.25);
            display: block; position: relative; overflow: hidden;
        }
        .module-menu-card:hover { transform: translateY(-3px) scale(1.04); }

        .module-menu-icon { font-size: 1.5em; display: block; margin-bottom: 6px; }
        .module-menu-label { font-size: 9px; font-weight: 700; color: #1a1a1a; line-height: 1.3; font-family: 'Montserrat', sans-serif; display: block; word-break: break-word; }

        /* MOBILE */
        @media (max-width: 768px) {
            body { padding: 0; background: #f0f2f5; }
            body::before { display: none; }
            .container { padding: 16px 12px 80px; border-radius: 0; box-shadow: none; }
            .container::before { border-radius: 0; }
            h1 { font-size: 1.6em; }
            .subtitle { font-size: 0.7em; letter-spacing: 1px; margin-bottom: 20px; }
            .notes-grid { grid-template-columns: 1fr; gap: 12px; }
            .note-card { padding: 16px; border-radius: 14px; }
            .note-title { font-size: 1em; }
            .note-preview { font-size: 12px; }
            .modal { align-items: flex-end; }
            .modal-content { border-radius: 20px 20px 0 0; padding: 24px 16px; max-width: 100%; max-height: 92vh; }
            .sidebar-menu { width: 100%; right: -100%; }
            .hamburger-btn { top: 14px; right: 14px; }
            .note-detail-body { padding: 16px; font-size: 14px; min-height: 200px; }
            .note-detail-title { font-size: 1.4em; }
        }
    </style>
</head>
<body>

<button class="hamburger-btn" onclick="toggleMenu()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMenu()"></div>
<div class="sidebar-menu" id="sidebarMenu">
    <div class="menu-section">
        <div class="menu-section-title">MODULOK</div>
        <div class="module-menu-grid">
            <a href="index.html" class="module-menu-card">
                <span class="module-menu-icon">📋</span>
                <span class="module-menu-label">Eseménynapló</span>
            </a>
            <a href="contacts.html" class="module-menu-card">
                <span class="module-menu-icon">📇</span>
                <span class="module-menu-label">Névjegyek</span>
            </a>
            <a href="notes.html" class="module-menu-card">
                <span class="module-menu-icon">📝</span>
                <span class="module-menu-label">Jegyzetek</span>
            </a>
            <a href="documents.html" class="module-menu-card">
                <span class="module-menu-icon">🗂️</span>
                <span class="module-menu-label">Dok.tár</span>
            </a>
            <a href="house-profile.html" class="module-menu-card">
                <span class="module-menu-icon">🏛️</span>
                <span class="module-menu-label">Házprofilok</span>
            </a>
        </div>
    </div>
</div>

<div class="container">
    <!-- LOGIN -->
    <div id="loginScreen" class="login-box">
        <div class="empty-state-icon">📝</div>
        <p>A jegyzetfüzethez bejelentkezés szükséges.</p>
        <input type="email" class="login-input" id="loginEmail" placeholder="email@cimed.hu">
        <button class="btn-primary" onclick="bejelentkezes()">Magic Link küldése</button>
        <div class="login-msg" id="loginMsg"></div>
    </div>

    <!-- MAIN -->
    <div id="mainContent" class="hidden">
        <!-- LIST VIEW -->
        <div id="notesList">
            <h1>📝 Jegyzetfüzet</h1>
            <p class="subtitle">Ötletek · Teendők · Feljegyzések</p>
            <div class="top-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Keresés..." oninput="renderNotes()">
                <select class="tag-filter" id="tagFilter" onchange="renderNotes()">
                    <option value="">Összes</option>
                </select>
                <button class="btn-primary" onclick="openModal()">✦ Új jegyzet</button>
            </div>
            <div class="notes-grid" id="notesGrid">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">📝</div>
                    <p>Még nincs egyetlen feljegyzés sem</p>
                </div>
            </div>
        </div>

        <!-- DETAIL VIEW -->
        <div id="noteDetail">
            <div class="note-detail-header">
                <button class="back-btn" onclick="showList()">← Vissza</button>
                <div class="note-actions" style="margin-left:auto">
                    <button class="btn-icon" id="detailEditBtn">✏️ Szerkesztés</button>
                    <button class="btn-icon btn-delete" id="detailDeleteBtn">🗑️ Törlés</button>
                </div>
            </div>
            <div id="detailTag" class="note-tag" style="margin-bottom:12px;display:inline-block;"></div>
            <div class="note-detail-title" id="detailTitle"></div>
            <div class="note-detail-body" id="detailBody"></div>
            <div style="margin-top:12px;font-size:12px;color:#bdc3c7;" id="detailDate"></div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal" id="noteModal">
    <div class="modal-content">
        <h2 id="modalTitle">Új jegyzet</h2>
        <form id="noteForm" onsubmit="saveNote(event)">
            <input type="hidden" id="noteId">
            <div class="form-group">
                <label>Cím *</label>
                <input type="text" id="noteTitle" placeholder="pl. Rendkívüli közgyűlés teendők" required>
            </div>
            <div class="form-group">
                <label>Címke / Kategória</label>
                <input type="text" id="noteTag" list="tagList" placeholder="pl. Teendő, Ötlet, Fontos...">
                <datalist id="tagList"></datalist>
            </div>
            <div class="form-group">
                <label>Tartalom</label>
                <textarea id="noteContent" placeholder="Írd ide a feljegyzésedet..."></textarea>
            </div>
            <div class="form-buttons">
                <button type="button" class="btn-primary btn-cancel" onclick="closeModal()">Mégse</button>
                <button type="submit" class="btn-primary">Mentés</button>
            </div>
        </form>
    </div>
</div>

<script>
    const sb = window.supabase.createClient(
        'https://afxtwbyeqxgjddlonptj.supabase.co',
        'sb_publishable_MMAhfCJ7JKo6CIduJtKcOg_Nksp8I81'
    );

    let notes = [];
    let currentUser = null;
    let currentDetailId = null;

    // AUTH
    sb.auth.onAuthStateChange((event, session) => {
        if (session) {
            currentUser = session.user;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            loadNotes();
        } else {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
        }
    });

    async function bejelentkezes() {
        const email = document.getElementById('loginEmail').value.trim();
        if (!email) { document.getElementById('loginMsg').innerHTML = '<span style="color:#c62828">Add meg az email címed!</span>'; return; }
        const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href } });
        document.getElementById('loginMsg').innerHTML = error
            ? `<span style="color:#c62828">Hiba: ${error.message}</span>`
            : '<span style="color:#2e7d32">✅ Link elküldve! Nézd meg az emailjeid.</span>';
    }

    // DATA
    async function loadNotes() {
        const { data, error } = await sb.from('notes').select('*').eq('user_id', currentUser.id).order('updated_at', { ascending: false });
        if (error) { console.error(error); return; }
        notes = data || [];
        updateTagFilter();
        renderNotes();
    }

    function updateTagFilter() {
        const tags = [...new Set(notes.map(n => n.tag).filter(Boolean))].sort();
        const filter = document.getElementById('tagFilter');
        const current = filter.value;
        filter.innerHTML = '<option value="">Összes</option>' + tags.map(t => `<option value="${t}" ${t === current ? 'selected' : ''}>${t}</option>`).join('');
        document.getElementById('tagList').innerHTML = tags.map(t => `<option value="${t}">`).join('');
    }

    function renderNotes() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const tagFilter = document.getElementById('tagFilter').value;

        let filtered = notes.filter(n => {
            const matchSearch = !search || n.title?.toLowerCase().includes(search) || n.content?.toLowerCase().includes(search) || n.tag?.toLowerCase().includes(search);
            return matchSearch && (!tagFilter || n.tag === tagFilter);
        });

        const grid = document.getElementById('notesGrid');
        document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'block';
        Array.from(grid.querySelectorAll('.note-card')).forEach(el => el.remove());

        filtered.forEach(n => {
            const card = document.createElement('div');
            card.className = 'note-card';
            const date = n.updated_at ? new Date(n.updated_at).toLocaleDateString('hu-HU') : '';
            card.innerHTML = `
                ${n.tag ? `<div class="note-tag">${escHtml(n.tag)}</div>` : ''}
                <div class="note-title">${escHtml(n.title)}</div>
                <div class="note-preview">${escHtml(n.content || '')}</div>
                <div class="note-footer">
                    <span class="note-date">${date}</span>
                    <div class="note-actions">
                        <button class="btn-icon" onclick="event.stopPropagation();editNote('${n.id}')">✏️</button>
                        <button class="btn-icon btn-delete" onclick="event.stopPropagation();deleteNote('${n.id}','${escHtml(n.title)}')">🗑️</button>
                    </div>
                </div>`;
            card.addEventListener('click', () => showDetail(n.id));
            grid.appendChild(card);
        });
    }

    function showDetail(id) {
        const n = notes.find(x => x.id === id);
        if (!n) return;
        currentDetailId = id;
        document.getElementById('detailTag').textContent = n.tag || '';
        document.getElementById('detailTag').style.display = n.tag ? 'inline-block' : 'none';
        document.getElementById('detailTitle').textContent = n.title || '';
        document.getElementById('detailBody').textContent = n.content || '';
        const date = n.updated_at ? new Date(n.updated_at).toLocaleString('hu-HU') : '';
        document.getElementById('detailDate').textContent = date ? `Módosítva: ${date}` : '';
        document.getElementById('detailEditBtn').onclick = () => editNote(id);
        document.getElementById('detailDeleteBtn').onclick = () => deleteNote(id, n.title);
        document.getElementById('notesList').style.display = 'none';
        document.getElementById('noteDetail').style.display = 'block';
    }

    function showList() {
        document.getElementById('notesList').style.display = 'block';
        document.getElementById('noteDetail').style.display = 'none';
    }

    function openModal(id = null) {
        document.getElementById('noteForm').reset();
        document.getElementById('noteId').value = '';
        document.getElementById('modalTitle').textContent = id ? 'Jegyzet szerkesztése' : 'Új jegyzet';
        if (id) {
            const n = notes.find(x => x.id === id);
            if (n) {
                document.getElementById('noteId').value = n.id;
                document.getElementById('noteTitle').value = n.title || '';
                document.getElementById('noteTag').value = n.tag || '';
                document.getElementById('noteContent').value = n.content || '';
            }
        }
        document.getElementById('noteModal').classList.add('open');
    }

    function closeModal() { document.getElementById('noteModal').classList.remove('open'); }
    function editNote(id) { openModal(id); }

    async function saveNote(e) {
        e.preventDefault();
        const id = document.getElementById('noteId').value;
        const data = {
            user_id: currentUser.id,
            title: document.getElementById('noteTitle').value.trim(),
            tag: document.getElementById('noteTag').value.trim(),
            content: document.getElementById('noteContent').value.trim(),
            updated_at: new Date().toISOString()
        };

        let error;
        if (id) {
            ({ error } = await sb.from('notes').update(data).eq('id', id).eq('user_id', currentUser.id));
        } else {
            data.created_at = new Date().toISOString();
            ({ error } = await sb.from('notes').insert(data));
        }

        if (error) { alert('Hiba: ' + error.message); return; }
        closeModal();
        await loadNotes();
        if (currentDetailId === id) showDetail(id);
    }

    async function deleteNote(id, title) {
        if (!confirm(`Biztosan törlöd?\n"${title}"`)) return;
        await sb.from('notes').delete().eq('id', id).eq('user_id', currentUser.id);
        if (document.getElementById('noteDetail').style.display !== 'none') showList();
        await loadNotes();
    }

    function escHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('noteModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

    function toggleMenu() {
        const menu = document.getElementById('sidebarMenu');
        const overlay = document.getElementById('sidebarOverlay');
        if (menu.classList.contains('open')) { closeMenu(); } else { menu.classList.add('open'); overlay.classList.add('active'); }
    }
    function closeMenu() {
        document.getElementById('sidebarMenu').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('active');
    }
</script>
</body>
</html>
