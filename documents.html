<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Property – Dokumentumtár</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; padding: 20px;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(212,175,55,0.1) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(184,134,11,0.1) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .container {
            max-width: 1200px; margin: 0 auto;
            background: rgba(255,255,255,0.98); border-radius: 30px; padding: 50px;
            box-shadow: 0 30px 90px rgba(0,0,0,0.5), 0 0 1px 1px rgba(212,175,55,0.3);
            position: relative; z-index: 1;
        }
        .container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, #d4af37, #f4e5c3, #d4af37); border-radius: 30px 30px 0 0;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #d4af37, #f4e5c3, #d4af37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; font-size: 2.8em; font-weight: 900;
        }
        .subtitle { text-align: center; color: #95a5a6; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 35px; }

        .top-bar { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; align-items: center; }

        .search-input {
            flex: 1; min-width: 200px; padding: 12px 20px;
            border: 2px solid #ecf0f1; border-radius: 50px;
            font-family: 'Montserrat', sans-serif; font-size: 14px; color: #2c3e50; outline: none; transition: border-color 0.3s;
        }
        .search-input:focus { border-color: #d4af37; }

        .cat-filter {
            padding: 12px 20px; border: 2px solid #ecf0f1; border-radius: 50px;
            font-family: 'Montserrat', sans-serif; font-size: 14px; color: #2c3e50; background: white; outline: none; cursor: pointer;
        }
        .cat-filter:focus { border-color: #d4af37; }

        .btn-primary {
            background: linear-gradient(135deg, #d4af37, #f4e5c3, #d4af37);
            color: #1a1a2e; border: none; padding: 12px 28px; border-radius: 50px;
            font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 14px;
            cursor: pointer; transition: all 0.3s; white-space: nowrap; box-shadow: 0 4px 15px rgba(212,175,55,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212,175,55,0.4); }
        .btn-cancel { background: linear-gradient(135deg, #95a5a6, #7f8c8d); color: white; }

        .docs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        .doc-card {
            background: white; border: 2px solid #ecf0f1; border-radius: 20px; padding: 25px;
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .doc-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 6px; height: 100%;
            background: linear-gradient(180deg, #d4af37, #f4e5c3);
        }
        .doc-card:hover { border-color: #d4af37; box-shadow: 0 8px 30px rgba(212,175,55,0.2); transform: translateY(-3px); }

        .doc-icon { font-size: 2.5em; margin-bottom: 12px; display: block; }
        .doc-category { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 10px; background: linear-gradient(135deg, #d4af37, #f4e5c3); color: #1a1a2e; }
        .doc-name { font-family: 'Playfair Display', serif; font-size: 1.1em; font-weight: 700; color: #2c3e50; margin-bottom: 6px; line-height: 1.3; }
        .doc-house { font-size: 12px; color: #7f8c8d; margin-bottom: 8px; }
        .doc-desc { font-size: 12px; color: #95a5a6; line-height: 1.5; margin-bottom: 15px; }
        .doc-meta { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid #ecf0f1; font-size: 11px; color: #bdc3c7; flex-wrap: wrap; gap: 8px; }
        .doc-actions { display: flex; gap: 6px; flex-wrap: wrap; }

        .btn-icon {
            background: none; border: 1px solid #ecf0f1; border-radius: 8px; padding: 5px 10px;
            font-size: 13px; cursor: pointer; font-family: 'Montserrat', sans-serif; color: #7f8c8d;
            transition: all 0.2s; text-decoration: none; display: inline-block;
        }
        .btn-icon:hover { border-color: #d4af37; color: #d4af37; }
        .btn-delete { color: #e74c3c; }
        .btn-delete:hover { border-color: #e74c3c !important; color: #e74c3c !important; }

        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 1000;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: white; border-radius: 25px; padding: 40px;
            width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; position: relative;
        }
        .modal-content::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #d4af37, #f4e5c3, #d4af37); border-radius: 25px 25px 0 0;
        }
        .modal-content h2 { font-family: 'Playfair Display', serif; font-size: 1.8em; color: #2c3e50; margin-bottom: 25px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #7f8c8d; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 18px; border: 2px solid #ecf0f1; border-radius: 12px;
            font-family: 'Montserrat', sans-serif; font-size: 14px; color: #2c3e50; outline: none; transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #d4af37; }
        .form-group textarea { resize: vertical; min-height: 80px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-buttons { display: flex; gap: 12px; margin-top: 25px; }

        .empty-state { text-align: center; padding: 80px 20px; color: #95a5a6; }
        .empty-state-icon { font-size: 4em; margin-bottom: 20px; }
        .hidden { display: none !important; }

        .login-box { text-align: center; padding: 60px 20px; }
        .login-box p { color: #666; margin-bottom: 20px; font-size: 15px; }
        .login-input {
            width: 100%; max-width: 360px; padding: 14px 20px; margin: 0 auto 14px;
            border: 2px solid #ecf0f1; border-radius: 50px;
            font-family: 'Montserrat', sans-serif; font-size: 15px; outline: none;
            transition: border-color 0.3s; display: block;
        }
        .login-input:focus { border-color: #d4af37; }
        .login-msg { font-size: 14px; margin-top: 12px; min-height: 20px; }

        .hamburger-btn {
            position: fixed; top: 25px; right: 25px; z-index: 3000;
            background: linear-gradient(135deg, #d4af37 0%, #f4e5c3 100%);
            border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #1a1a2e; transition: all 0.3s;
        }
        .hamburger-btn:hover { transform: scale(1.05); }

        .sidebar-menu {
            position: fixed; top: 0; right: -350px; width: 350px; height: 100vh;
            background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%);
            box-shadow: -5px 0 30px rgba(0,0,0,0.3); z-index: 2500;
            transition: right 0.4s cubic-bezier(0.4,0,0.2,1); overflow-y: auto;
            padding: 100px 30px 30px;
        }
        .sidebar-menu.open { right: 0; }

        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .sidebar-overlay.active { opacity: 1; pointer-events: all; }

        .menu-section { margin-bottom: 35px; }
        .menu-section-title { font-family: 'Playfair Display', serif; font-size: 1.1em; font-weight: 700; color: #2c3e50; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #d4af37; letter-spacing: 1px; }

        .module-menu-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .module-menu-card {
            background: linear-gradient(160deg, #fffbe6 0%, #f5e6b0 50%, #e8c94a 100%);
            border: 2px solid #1a1a1a; border-radius: 14px; padding: 14px 6px 12px;
            text-align: center; text-decoration: none; cursor: pointer;
            transition: all 0.25s; box-shadow: 0 3px 10px rgba(0,0,0,0.25); display: block;
        }
        .module-menu-card:hover { transform: translateY(-3px) scale(1.04); }
        .module-menu-icon { font-size: 1.5em; display: block; margin-bottom: 6px; }
        .module-menu-label { font-size: 9px; font-weight: 700; color: #1a1a1a; line-height: 1.3; font-family: 'Montserrat', sans-serif; display: block; word-break: break-word; }

        @media (max-width: 768px) {
            body { padding: 0; background: #f0f2f5; }
            body::before { display: none; }
            .container { padding: 16px 12px 80px; border-radius: 0; box-shadow: none; }
            .container::before { border-radius: 0; }
            h1 { font-size: 1.6em; }
            .subtitle { font-size: 0.7em; letter-spacing: 1px; margin-bottom: 20px; }
            .docs-grid { grid-template-columns: 1fr; gap: 12px; }
            .doc-card { padding: 16px 14px 14px; border-radius: 14px; }
            .form-row { grid-template-columns: 1fr; }
            .modal { align-items: flex-end; }
            .modal-content { border-radius: 20px 20px 0 0; padding: 24px 16px; max-width: 100%; max-height: 92vh; }
            .sidebar-menu { width: 100%; right: -100%; }
            .hamburger-btn { top: 14px; right: 14px; }
        }
    </style>
</head>
<body>

<button class="hamburger-btn" onclick="toggleMenu()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMenu()"></div>
<div class="sidebar-menu" id="sidebarMenu">
    <div class="menu-section">
        <div class="menu-section-title">MODULOK</div>
        <div class="module-menu-grid">
            <a href="index.html" class="module-menu-card"><span class="module-menu-icon">📋</span><span class="module-menu-label">Eseménynapló</span></a>
            <a href="contacts.html" class="module-menu-card"><span class="module-menu-icon">📇</span><span class="module-menu-label">Névjegyek</span></a>
            <a href="notes.html" class="module-menu-card"><span class="module-menu-icon">📝</span><span class="module-menu-label">Jegyzetek</span></a>
            <a href="documents.html" class="module-menu-card"><span class="module-menu-icon">🗂️</span><span class="module-menu-label">Dok.tár</span></a>
            <a href="house-profile.html" class="module-menu-card"><span class="module-menu-icon">🏛️</span><span class="module-menu-label">Házprofilok</span></a>
        </div>
    </div>
</div>

<div class="container">
    <div id="loginScreen" class="login-box">
        <div class="empty-state-icon">🗂️</div>
        <p>A dokumentumtárhoz bejelentkezés szükséges.</p>
        <input type="email" class="login-input" id="loginEmail" placeholder="email@cimed.hu">
        <button class="btn-primary" onclick="bejelentkezes()">Magic Link küldése</button>
        <div class="login-msg" id="loginMsg"></div>
    </div>

    <div id="mainContent" class="hidden">
        <h1>🗂️ Dokumentumtár</h1>
        <p class="subtitle">Kötvények · Okiratok · Szerződések</p>

        <div class="top-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Keresés dokumentumok között..." oninput="renderDocs()">
            <select class="cat-filter" id="catFilter" onchange="renderDocs()">
                <option value="">Összes kategória</option>
            </select>
            <button class="btn-primary" onclick="openModal()">✦ Dokumentum hozzáadása</button>
        </div>

        <div class="docs-grid" id="docsGrid">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">🗂️</div>
                <p>Még nincs feltöltött dokumentum</p>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="docModal">
    <div class="modal-content">
        <h2 id="modalTitle">Dokumentum hozzáadása</h2>
        <form id="docForm" onsubmit="saveDoc(event)">
            <input type="hidden" id="docId">
            <div class="form-row">
                <div class="form-group">
                    <label>Dokumentum neve *</label>
                    <input type="text" id="docName" placeholder="pl. Biztosítási kötvény 2025" required>
                </div>
                <div class="form-group">
                    <label>Kategória *</label>
                    <input type="text" id="docCategory" list="catList" placeholder="pl. Biztosítás, Szerződés..." required>
                    <datalist id="catList"></datalist>
                </div>
            </div>
            <div class="form-group">
                <label>Ingatlan (opcionális)</label>
                <input type="text" id="docHouse" placeholder="pl. Fő utca 12., vagy üres ha általános">
            </div>
            <div class="form-group">
                <label>Link / URL (Google Drive, stb.)</label>
                <input type="url" id="docLink" placeholder="https://drive.google.com/...">
            </div>
            <div class="form-group">
                <label>Megjegyzés / Leírás</label>
                <textarea id="docNotes" placeholder="pl. Lejárat: 2026. március, éves díj: 85.000 Ft"></textarea>
            </div>
            <div class="form-group">
                <label>Lejárat dátuma (opcionális)</label>
                <input type="date" id="docExpiry">
            </div>
            <div class="form-buttons">
                <button type="button" class="btn-primary btn-cancel" onclick="closeModal()">Mégse</button>
                <button type="submit" class="btn-primary">Mentés</button>
            </div>
        </form>
    </div>
</div>

<script>
    const sb = window.supabase.createClient(
        'https://afxtwbyeqxgjddlonptj.supabase.co',
        'sb_publishable_MMAhfCJ7JKo6CIduJtKcOg_Nksp8I81'
    );

    let docs = [];
    let currentUser = null;

    sb.auth.onAuthStateChange((event, session) => {
        if (session) {
            currentUser = session.user;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            loadDocs();
        } else {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
        }
    });

    async function bejelentkezes() {
        const email = document.getElementById('loginEmail').value.trim();
        if (!email) { document.getElementById('loginMsg').innerHTML = '<span style="color:#c62828">Add meg az email címed!</span>'; return; }
        const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href } });
        document.getElementById('loginMsg').innerHTML = error
            ? `<span style="color:#c62828">Hiba: ${error.message}</span>`
            : '<span style="color:#2e7d32">✅ Link elküldve!</span>';
    }

    async function loadDocs() {
        const { data, error } = await sb.from('documents').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
        if (error) { console.error(error); return; }
        docs = data || [];
        updateCatFilter();
        renderDocs();
    }

    function updateCatFilter() {
        const cats = [...new Set(docs.map(d => d.category).filter(Boolean))].sort();
        const filter = document.getElementById('catFilter');
        const current = filter.value;
        filter.innerHTML = '<option value="">Összes kategória</option>' + cats.map(c => `<option value="${c}" ${c === current ? 'selected' : ''}>${c}</option>`).join('');
        document.getElementById('catList').innerHTML = cats.map(c => `<option value="${c}">`).join('');
    }

    function getDocIcon(category) {
        const cat = (category || '').toLowerCase();
        if (cat.includes('biztosít')) return '🛡️';
        if (cat.includes('alapít') || cat.includes('okirat')) return '📜';
        if (cat.includes('szerződ')) return '📃';
        if (cat.includes('számla') || cat.includes('pénzügy')) return '💰';
        return '🗂️';
    }

    function renderDocs() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const catFilter = document.getElementById('catFilter').value;

        const filtered = docs.filter(d => {
            const matchSearch = !search || d.name?.toLowerCase().includes(search) || d.category?.toLowerCase().includes(search) || d.house?.toLowerCase().includes(search) || d.notes?.toLowerCase().includes(search);
            return matchSearch && (!catFilter || d.category === catFilter);
        });

        const grid = document.getElementById('docsGrid');
        document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'block';
        Array.from(grid.querySelectorAll('.doc-card')).forEach(el => el.remove());

        filtered.forEach(d => {
            const card = document.createElement('div');
            card.className = 'doc-card';
            const date = d.created_at ? new Date(d.created_at).toLocaleDateString('hu-HU') : '';
            const isExpired = d.expiry && new Date(d.expiry) < new Date();
            const isExpiring = d.expiry && !isExpired && new Date(d.expiry) < new Date(Date.now() + 30 * 86400000);

            card.innerHTML = `
                <span class="doc-icon">${getDocIcon(d.category)}</span>
                <div class="doc-category">${escHtml(d.category || 'Egyéb')}</div>
                <div class="doc-name">${escHtml(d.name)}</div>
                ${d.house ? `<div class="doc-house">🏛️ ${escHtml(d.house)}</div>` : ''}
                ${d.notes ? `<div class="doc-desc">${escHtml(d.notes)}</div>` : ''}
                ${d.expiry ? `<div style="font-size:12px;font-weight:700;color:${isExpired ? '#e74c3c' : isExpiring ? '#e67e22' : '#27ae60'};margin-bottom:10px;">
                    ${isExpired ? '⚠️' : isExpiring ? '⏰' : '✅'} Lejár: ${d.expiry}
                </div>` : ''}
                <div class="doc-meta">
                    <span>${date}</span>
                    <div class="doc-actions">
                        ${d.link ? `<a class="btn-icon" href="${d.link}" target="_blank" rel="noopener">🔗 Megnyitás</a>` : ''}
                        <button class="btn-icon" onclick="editDoc('${d.id}')">✏️</button>
                        <button class="btn-icon btn-delete" onclick="deleteDoc('${d.id}','${escHtml(d.name)}')">🗑️</button>
                    </div>
                </div>`;
            grid.appendChild(card);
        });
    }

    function openModal(id = null) {
        document.getElementById('docForm').reset();
        document.getElementById('docId').value = '';
        document.getElementById('modalTitle').textContent = id ? 'Dokumentum szerkesztése' : 'Dokumentum hozzáadása';
        if (id) {
            const d = docs.find(x => x.id === id);
            if (d) {
                document.getElementById('docId').value = d.id;
                document.getElementById('docName').value = d.name || '';
                document.getElementById('docCategory').value = d.category || '';
                document.getElementById('docHouse').value = d.house || '';
                document.getElementById('docLink').value = d.link || '';
                document.getElementById('docNotes').value = d.notes || '';
                document.getElementById('docExpiry').value = d.expiry || '';
            }
        }
        document.getElementById('docModal').classList.add('open');
    }

    function closeModal() { document.getElementById('docModal').classList.remove('open'); }
    function editDoc(id) { openModal(id); }

    async function saveDoc(e) {
        e.preventDefault();
        const id = document.getElementById('docId').value;
        const data = {
            user_id: currentUser.id,
            name: document.getElementById('docName').value.trim(),
            category: document.getElementById('docCategory').value.trim(),
            house: document.getElementById('docHouse').value.trim(),
            link: document.getElementById('docLink').value.trim(),
            notes: document.getElementById('docNotes').value.trim(),
            expiry: document.getElementById('docExpiry').value || null,
            updated_at: new Date().toISOString()
        };

        let error;
        if (id) {
            ({ error } = await sb.from('documents').update(data).eq('id', id).eq('user_id', currentUser.id));
        } else {
            data.created_at = new Date().toISOString();
            ({ error } = await sb.from('documents').insert(data));
        }

        if (error) { alert('Hiba: ' + error.message); return; }
        closeModal();
        await loadDocs();
    }

    async function deleteDoc(id, name) {
        if (!confirm(`Biztosan törlöd?\n"${name}"`)) return;
        await sb.from('documents').delete().eq('id', id).eq('user_id', currentUser.id);
        await loadDocs();
    }

    function escHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('docModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

    function toggleMenu() {
        const menu = document.getElementById('sidebarMenu');
        const overlay = document.getElementById('sidebarOverlay');
        if (menu.classList.contains('open')) closeMenu();
        else { menu.classList.add('open'); overlay.classList.add('active'); }
    }
    function closeMenu() {
        document.getElementById('sidebarMenu').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('active');
    }
</script>
</body>
</html>
